services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGBOUNCER_HOST=${PGBOUNCER_HOST:-pgbouncer}
      - PGBOUNCER_PORT=${PGBOUNCER_PORT:-6432}
      - USE_PGBOUNCER=${USE_PGBOUNCER:-true}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_FORMAT=${LOG_FORMAT}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-smtp}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Yoohoo}
      - EMAIL_FALLBACK_PROVIDER=${EMAIL_FALLBACK_PROVIDER:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - EMAIL_ACCOUNT_FROM=${EMAIL_ACCOUNT_FROM:-}
      - EMAIL_ACCOUNT_NAME=${EMAIL_ACCOUNT_NAME:-}
      - EMAIL_SECURITY_FROM=${EMAIL_SECURITY_FROM:-}
      - EMAIL_SECURITY_NAME=${EMAIL_SECURITY_NAME:-}
      - EMAIL_NOTIFICATION_FROM=${EMAIL_NOTIFICATION_FROM:-}
      - EMAIL_NOTIFICATION_NAME=${EMAIL_NOTIFICATION_NAME:-}
      - EMAIL_BILLING_FROM=${EMAIL_BILLING_FROM:-}
      - EMAIL_BILLING_NAME=${EMAIL_BILLING_NAME:-}
      - FRONTEND_URL=${FRONTEND_URL}
      - EMAIL_VERIFICATION_EXPIRE_HOURS=${EMAIL_VERIFICATION_EXPIRE_HOURS}
      - UNVERIFIED_CLEANUP_DAYS=${UNVERIFIED_CLEANUP_DAYS}
      - ARQ_REDIS_DB=${ARQ_REDIS_DB:-1}
      - ARQ_MAX_JOBS=${ARQ_MAX_JOBS:-10}
      - ARQ_JOB_TIMEOUT=${ARQ_JOB_TIMEOUT:-300}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: arq app.core.worker.WorkerSettings
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGBOUNCER_HOST=${PGBOUNCER_HOST:-pgbouncer}
      - PGBOUNCER_PORT=${PGBOUNCER_PORT:-6432}
      - USE_PGBOUNCER=${USE_PGBOUNCER:-true}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - ARQ_REDIS_DB=${ARQ_REDIS_DB:-1}
      - ARQ_MAX_JOBS=${ARQ_MAX_JOBS:-10}
      - ARQ_JOB_TIMEOUT=${ARQ_JOB_TIMEOUT:-300}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-smtp}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Yoohoo}
      - EMAIL_FALLBACK_PROVIDER=${EMAIL_FALLBACK_PROVIDER:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - EMAIL_ACCOUNT_FROM=${EMAIL_ACCOUNT_FROM:-}
      - EMAIL_ACCOUNT_NAME=${EMAIL_ACCOUNT_NAME:-}
      - EMAIL_SECURITY_FROM=${EMAIL_SECURITY_FROM:-}
      - EMAIL_SECURITY_NAME=${EMAIL_SECURITY_NAME:-}
      - EMAIL_NOTIFICATION_FROM=${EMAIL_NOTIFICATION_FROM:-}
      - EMAIL_NOTIFICATION_NAME=${EMAIL_NOTIFICATION_NAME:-}
      - EMAIL_BILLING_FROM=${EMAIL_BILLING_FROM:-}
      - EMAIL_BILLING_NAME=${EMAIL_BILLING_NAME:-}
      - LOG_FORMAT=${LOG_FORMAT}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        FRONTEND_PORT: ${FRONTEND_PORT}
    command: npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT}
    environment:
      - API_HOST=api
      - API_PORT=8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AUTH_TYPE=plain
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data_dev:
