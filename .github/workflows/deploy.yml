name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/yoohoo
            echo "--- Pulling latest images ---"
            docker compose pull
            docker compose -f monitoring/docker-compose.monitoring.yml pull
            docker compose -f monitoring/docker-compose.collector.yml pull
            echo "--- Starting services ---"
            docker compose up -d
            docker compose -f monitoring/docker-compose.monitoring.yml up -d
            docker compose -f monitoring/docker-compose.collector.yml up -d
            echo "--- Running migrations ---"
            docker compose exec -T api alembic -x mode=central upgrade head
            echo "--- Waiting for health check ---"
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost/health/ready > /dev/null 2>&1; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Health check failed (attempt $i), retrying in 10s..."
              sleep 10
            done
            echo "Health check failed after 5 attempts!"
            exit 1

      - name: Notify Slack (success)
        if: success()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: *Yoohoo deployed successfully*\nCommit: `${{ github.event.workflow_run.head_sha }}`\nBranch: `main`"
            }

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *Yoohoo deploy FAILED*\nCommit: `${{ github.event.workflow_run.head_sha }}`\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
