# Yoohoo Production Deploy
#
# Triggered after CI completes successfully on main.
# Deploys SHA-pinned Docker images — never :latest in production.
#
# Required GitHub Secrets:
#   VPS_HOST            — VPS IPv4 address (from terraform output)
#   VPS_SSH_KEY         — SSH private key for deploy user
#   VPS_SSH_FINGERPRINT — SSH host key fingerprint (prevents MITM)
#   GHCR_TOKEN          — GitHub PAT with read:packages scope only
#   SLACK_WEBHOOK_URL   — Slack webhook for deploy notifications (optional)

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image SHA tag to deploy (from GHCR)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Verify host key fingerprint (prevents MITM)
          ACTUAL=$(ssh-keyscan -t ed25519 ${{ secrets.VPS_HOST }} 2>/dev/null | ssh-keygen -lf - | awk '{print $2}')
          EXPECTED="${{ secrets.VPS_SSH_FINGERPRINT }}"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::SSH host key fingerprint mismatch! Expected: $EXPECTED, Got: $ACTUAL"
            exit 1
          fi
          ssh-keyscan -t ed25519 ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || inputs.image_tag }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes deploy@${VPS_HOST} bash -s <<DEPLOY_SCRIPT
            set -euo pipefail
            IMAGE_TAG="${IMAGE_TAG}"

            # GUARD: IMAGE_TAG must be set (never fallback to :latest)
            test -n "\$IMAGE_TAG" || { echo "FATAL: IMAGE_TAG is empty"; exit 1; }

            cd /opt/yoohoo
            echo "=== Deploying commit \${IMAGE_TAG} ==="

            # 1. Update config files pinned to exact commit
            git fetch origin "\$IMAGE_TAG"
            git checkout "\$IMAGE_TAG" -- \
              docker-compose.yml \
              nginx/ \
              monitoring/ \
              scripts/ \
              pgbouncer/pgbouncer.ini

            # 2. GHCR login in temp directory (no credentials left on disk)
            DOCKER_CONFIG_DIR="\$(mktemp -d)"
            export DOCKER_CONFIG="\$DOCKER_CONFIG_DIR"
            trap 'rm -rf "\$DOCKER_CONFIG_DIR"; unset DOCKER_CONFIG' EXIT
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u deploy --password-stdin

            # 3. Pull pinned images (exact SHA from CI — all image services explicit)
            IMAGE_TAG=\${IMAGE_TAG} docker compose pull api worker frontend

            # 4. Deploy with pinned SHA
            IMAGE_TAG=\${IMAGE_TAG} docker compose up -d

            # 5. Run migrations (strict — fail on any error)
            echo "--- Central migrations ---"
            docker compose exec -T api alembic -x mode=central upgrade central@head

            echo "--- Tenant migrations ---"
            bash scripts/migrate-all-tenants.sh

            # 6. Restart monitoring stacks
            docker compose -f monitoring/docker-compose.monitoring.yml up -d
            docker compose -f monitoring/docker-compose.collector.yml up -d

            # 7. Health check (5 attempts, 10s interval)
            echo "--- Health check ---"
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost/health/ready > /dev/null 2>&1; then
                echo "=== Deploy SUCCESS: \${IMAGE_TAG} ==="
                echo "\${IMAGE_TAG}" > /opt/yoohoo/.deployed-version
                exit 0
              fi
              echo "Health check failed (attempt \$i), retrying in 10s..."
              sleep 10
            done
            echo "DEPLOY FAILED: health check timeout after 5 attempts"
            exit 1
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Notify Slack (success)
        if: success()
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: *Yoohoo deployed successfully*\nCommit: `${{ github.event.workflow_run.head_sha || inputs.image_tag }}`\nBranch: `main`"
            }

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *Yoohoo deploy FAILED*\nCommit: `${{ github.event.workflow_run.head_sha || inputs.image_tag }}`\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
