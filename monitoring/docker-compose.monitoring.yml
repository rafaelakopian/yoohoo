# Yoohoo Monitoring Platform — Prometheus, Grafana, Loki, Uptime Kuma
#
# Deze stack is ontworpen om eenvoudig te verplaatsen naar een aparte server.
# Promtail (log collector) draait apart via docker-compose.collector.yml.
#
# === Op dezelfde server (standaard) ===
#   docker compose -f docker-compose.yml \
#     -f monitoring/docker-compose.monitoring.yml \
#     -f monitoring/docker-compose.collector.yml up -d
#
# === Op aparte monitoring server ===
#   1. Kopieer monitoring/ map naar de monitoring server
#   2. Wijzig monitoring/prometheus/targets/yoohoo.json:
#      targets: ["<app-server-ip>:8000"]
#   3. Uncomment de Loki poort hieronder (3100)
#   4. Start: docker compose -f docker-compose.monitoring.yml up -d
#   5. Op de app-server: wijzig promtail.yml loki URL naar http://<monitoring-ip>:3100
#      en start: docker compose -f monitoring/docker-compose.collector.yml up -d

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: yoohoo-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=1GB'
    networks:
      - monitoring
      - default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  grafana:
    image: grafana/grafana:latest
    container_name: yoohoo-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  loki:
    image: grafana/loki:latest
    container_name: yoohoo-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    # --- Uncomment voor remote Promtail toegang (aparte server) ---
    # ports:
    #   - "3100:3100"
    networks:
      - monitoring
      - default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: yoohoo-uptime-kuma
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  uptime_kuma_data:

networks:
  # Intern monitoring netwerk — Grafana ↔ Prometheus ↔ Loki
  monitoring:
    name: yoohoo_monitoring

  # Bridge naar app-netwerk — Prometheus scraping + Promtail → Loki
  # Verwijder dit blok als monitoring op een aparte server draait
  default:
    name: yoohoo_default
    external: true
