services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No host port mapping in production — only accessible via Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  redis:
    image: redis:7-alpine
    # No host port mapping in production — only accessible via Docker network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  api:
    image: ghcr.io/rafaelakopian/yoohoo/api:${IMAGE_TAG:?IMAGE_TAG must be set}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGBOUNCER_HOST=${PGBOUNCER_HOST:-pgbouncer}
      - PGBOUNCER_PORT=${PGBOUNCER_PORT:-6432}
      - USE_PGBOUNCER=${USE_PGBOUNCER:-true}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ARQ_REDIS_DB=${ARQ_REDIS_DB:-1}
      - ARQ_MAX_JOBS=${ARQ_MAX_JOBS:-10}
      - ARQ_JOB_TIMEOUT=${ARQ_JOB_TIMEOUT:-300}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-smtp}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Yoohoo}
      - EMAIL_FALLBACK_PROVIDER=${EMAIL_FALLBACK_PROVIDER:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - EMAIL_ACCOUNT_FROM=${EMAIL_ACCOUNT_FROM:-}
      - EMAIL_ACCOUNT_NAME=${EMAIL_ACCOUNT_NAME:-}
      - EMAIL_SECURITY_FROM=${EMAIL_SECURITY_FROM:-}
      - EMAIL_SECURITY_NAME=${EMAIL_SECURITY_NAME:-}
      - EMAIL_NOTIFICATION_FROM=${EMAIL_NOTIFICATION_FROM:-}
      - EMAIL_NOTIFICATION_NAME=${EMAIL_NOTIFICATION_NAME:-}
      - EMAIL_BILLING_FROM=${EMAIL_BILLING_FROM:-}
      - EMAIL_BILLING_NAME=${EMAIL_BILLING_NAME:-}
      - FRONTEND_URL=${FRONTEND_URL}
      - EMAIL_VERIFICATION_EXPIRE_HOURS=${EMAIL_VERIFICATION_EXPIRE_HOURS:-48}
      - UNVERIFIED_CLEANUP_DAYS=${UNVERIFIED_CLEANUP_DAYS:-7}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - PLATFORM_NAME=${PLATFORM_NAME:-Yoohoo}
      - PLATFORM_URL=${PLATFORM_URL}
      - INVITATION_EXPIRE_HOURS=${INVITATION_EXPIRE_HOURS:-72}
      - PASSWORD_RESET_EXPIRE_MINUTES=${PASSWORD_RESET_EXPIRE_MINUTES:-30}
      - TOTP_ISSUER_NAME=${TOTP_ISSUER_NAME:-Yoohoo}
      - MAX_ACTIVE_SESSIONS=${MAX_ACTIVE_SESSIONS:-10}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
    # No host port mapping in production — only accessible via Nginx reverse proxy
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  worker:
    image: ghcr.io/rafaelakopian/yoohoo/api:${IMAGE_TAG:?IMAGE_TAG must be set}
    command: arq app.core.worker.WorkerSettings
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGBOUNCER_HOST=${PGBOUNCER_HOST:-pgbouncer}
      - PGBOUNCER_PORT=${PGBOUNCER_PORT:-6432}
      - USE_PGBOUNCER=${USE_PGBOUNCER:-true}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - ARQ_REDIS_DB=${ARQ_REDIS_DB:-1}
      - ARQ_MAX_JOBS=${ARQ_MAX_JOBS:-10}
      - ARQ_JOB_TIMEOUT=${ARQ_JOB_TIMEOUT:-300}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-smtp}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Yoohoo}
      - EMAIL_FALLBACK_PROVIDER=${EMAIL_FALLBACK_PROVIDER:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - EMAIL_ACCOUNT_FROM=${EMAIL_ACCOUNT_FROM:-}
      - EMAIL_ACCOUNT_NAME=${EMAIL_ACCOUNT_NAME:-}
      - EMAIL_SECURITY_FROM=${EMAIL_SECURITY_FROM:-}
      - EMAIL_SECURITY_NAME=${EMAIL_SECURITY_NAME:-}
      - EMAIL_NOTIFICATION_FROM=${EMAIL_NOTIFICATION_FROM:-}
      - EMAIL_NOTIFICATION_NAME=${EMAIL_NOTIFICATION_NAME:-}
      - EMAIL_BILLING_FROM=${EMAIL_BILLING_FROM:-}
      - EMAIL_BILLING_NAME=${EMAIL_BILLING_NAME:-}
      - LOG_FORMAT=${LOG_FORMAT}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  frontend:
    image: ghcr.io/rafaelakopian/yoohoo/frontend:${IMAGE_TAG:?IMAGE_TAG must be set}
    # No host port mapping in production — only accessible via Nginx reverse proxy
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.ssl.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx/www:/usr/share/nginx/www:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

volumes:
  postgres_data:
  redis_data:
